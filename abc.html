<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    min-height: 100vh;
}

/* Navbar */
.navbar {
    background: rgba(255,255,255,0.2);
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h2 {
    margin: 0;
}

/* Layout */
.container {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: rgba(255,255,255,0.15);

    height: calc(100vh - 60px);
    padding-top: 20px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px 20px;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
    border-radius: 5px;
}

/* Main Content */
.main {
    flex: 1;
    padding: 30px;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    flex: 1;
    min-width: 200px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.card h3 {
    margin: 0;
    color: #333;
}

.card p {
    font-size: 24px;
    color: #4facfe;
    margin-top: 10px;
}

/* Welcome Box */
.welcome {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* Responsive */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        height: auto;
        display: flex;
        justify-content: space-around;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>My App</h2>
    <div>Welcome, User 👋</div>
</div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="#">🏠 Dashboard</a>
        <a href="#">📊 Analytics</a>
        <a href="#">👤 Profile</a>
        <a href="#">⚙️ Settings</a>
        <a href="#">🚪 Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="welcome">
            <h2>Welcome back!</h2>
            <p>Here's what's happening today.</p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Users</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Sales</h3>
                <p>$3,450</p>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <p>89</p>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <p>$8,920</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
