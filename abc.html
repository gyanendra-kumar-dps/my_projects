<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Div Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    .table {
      display: flex;
      flex-direction: column;
      width: 600px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .row {
      display: flex;
    }

    .cell {
      flex: 1;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
    }

    .header {
      background: #2c3e50;
      color: white;
      font-weight: bold;
    }

    .row:nth-child(even):not(.header) {
      background: #f9fbfd;
    }

    .row:hover:not(.header) {
      background: #eef3f7;
    }

    .cell:first-child {
      flex: 1;
    }
  </style>
</head>
<body>

<div class="table">
  <div class="row header">
    <div class="cell">ID</div>
    <div class="cell">Name</div>
    <div class="cell">Email</div>
  </div>

  <div class="row">
    <div class="cell">1</div>
    <div class="cell">Alice</div>
    <div class="cell">alice@example.com</div>
  </div>

  <div class="row">
    <div class="cell">2</div>
    <div class="cell">Bob</div>
    <div class="cell">bob@example.com</div>
  </div>

  <div class="row">
    <div class="cell">3</div>
    <div class="cell">Charlie</div>
    <div class="cell">charlie@example.com</div>
  </div>
</div>

</body>
</html>
